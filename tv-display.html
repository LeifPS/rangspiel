<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * {
      touch-action: manipulation;
    }
  </style>
  <title>Rangspiel - TV Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
       --bg:#0a0c12; --bg2:#111420; --bg3:#181c2a; --border:#2a3048;
      --accent:#e8b84b; --accent2:#c97a2f; --text:#e8eaf0; --text2:#7c839f; --text3:#4a5070;
      --success:#4ce87a; --danger:#e84c4c;
      --radius:12px; --radius-sm:8px; --transition:0.3s ease;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px;-webkit-tap-highlight-color:transparent;background:#0a0c12}
    body{background:#0a0c12;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-weight:400;min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% -10%,rgba(232,184,75,.06) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 110%,rgba(201,122,47,.05) 0%,transparent 50%);pointer-events:none;z-index:0}
    
    .app{max-width:1400px;margin:0 auto;position:relative;z-index:1;padding:20px;height:100vh;display:grid;grid-template-columns:1fr 1fr;gap:10px;max-height:100vh;overflow:hidden;background:#0a0c12}
    
    @media (max-width:1024px) {
      .app{grid-template-columns:1fr;grid-template-rows:auto 1fr 1fr;gap:15px;padding:15px;height:auto;max-height:none;overflow:visible}
    }
    
    /* HEADER */
    .header{grid-column:1/-1;padding:5px 15px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,var(--bg2) 0%,transparent 100%);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:var(--radius)}
    .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
    .logo{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase}
    .logo span{color:var(--text2)}
    .header-right{display:flex;align-items:center;gap:12px}
    .round-badge{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:6px 16px;font-size:1rem;font-weight:600;color:var(--text2);letter-spacing:1px;text-transform:uppercase}
    .round-badge em{color:var(--accent);font-style:normal}
    .mm-toggle{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:0.9rem;font-weight:700;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;transition:var(--transition)}
    .mm-toggle.on{border-color:rgba(232,184,75,.4);color:var(--accent);background:rgba(232,184,75,.08)}
    .mm-dot{width:10px;height:10px;border-radius:50%;background:var(--text3);transition:var(--transition)}
    .mm-toggle.on .mm-dot{background:var(--accent);box-shadow:0 0 8px var(--accent)}
    
    /* LEFT PANEL - RANKLIST */
    .left-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:0 8px 8px 8px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
    .panel-title{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;color:var(--accent);letter-spacing:1px;margin-bottom:6px;text-transform:uppercase;padding:4px 0;text-shadow:0 0 10px rgba(232,184,75,0.3)}
    
    .ranklist{flex:1;overflow-y:auto;padding-right:10px}
    .ranklist::-webkit-scrollbar{width:6px}
    .ranklist::-webkit-scrollbar-track{background:var(--bg3);border-radius:3px}
    .ranklist::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    .ranklist::-webkit-scrollbar-thumb:hover{background:var(--text3)}
    
    .rank-item{display:flex;align-items:center;padding:14px 16px;margin-bottom:10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);transition:var(--transition);animation:fadeIn 0.3s ease;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
    .rank-item:hover{border-color:rgba(232,184,75,.5);transform:translateX(4px);box-shadow:0 4px 16px rgba(232,184,75,.15)}
    .rank-number{font-family:'Rajdhani',sans-serif;font-size:1.8rem;font-weight:700;color:var(--accent);width:40px;text-align:center}
    .rank-between{padding:10px 14px;margin:10px 0;background:linear-gradient(135deg,rgba(232,184,75,0.08) 0%,rgba(232,184,75,0.02) 100%);border:1px solid rgba(232,184,75,0.2);border-radius:var(--radius);animation:fadeIn 0.4s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden}
    .rank-between::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.6}
    .rank-between-count{font-size:0.9rem;color:var(--accent);font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px;font-family:'Rajdhani',sans-serif;letter-spacing:0.5px;text-transform:uppercase}
    .rank-between-count::before{content:'⚡';font-size:1rem}
    .rank-between-names{font-size:0.78rem;color:var(--text2);line-height:1.4;background:rgba(0,0,0,0.15);padding:8px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.05)}
    
    /* INACTIVE LIST */
    .inactive-list{flex:1;overflow-y:auto;max-height:200px;padding-right:8px}
    .inactive-list::-webkit-scrollbar{width:4px}
    .inactive-list::-webkit-scrollbar-track{background:var(--bg3);border-radius:2px}
    .inactive-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;margin-bottom:4px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);opacity:0.6;font-size:0.75rem}
    .inactive-name{font-size:0.75rem;color:var(--text2)}
    .inactive-points{font-size:0.7rem;color:var(--text3)}
    
    /* MATCHMAKING LIST */
    .matchmaking-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
    .matchmaking-section{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px}
    .matchmaking-phase-title{font-size:1rem;font-weight:600;color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
    .matchmaking-players{display:flex;flex-wrap:wrap;gap:6px}
    .matchmaking-player{padding:4px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.85rem;color:var(--text2)}
    .rank-icon{display:inline-block;width:40px;height:40px;border-radius:50%;background-size:contain;background-repeat:no-repeat;background-position:center;flex-shrink:0;margin-right:0}
    .rank-info{flex:1}
    .rank-name{font-size:1.3rem;font-weight:600;margin-bottom:4px}
    .rank-badge{display:inline-block;padding:4px 10px;border-radius:4px;font-size:0.9rem;font-weight:600;text-transform:uppercase;margin-left:8px}
    .rank-points{font-size:1.1rem;color:var(--success);font-weight:600}
    .rank-max{color:var(--text3);font-size:0.95rem;margin-left:6px}
    .rank-streak{color:var(--accent);font-size:1rem;margin-left:12px}
    .rank-accounts{color:var(--text2);font-size:0.9rem;margin-left:8px}
    
    /* RIGHT PANEL */
    .right-panel{display:grid;grid-template-rows:1fr;gap:20px;overflow:hidden;min-height:0}
    
    /* MATCHMAKING PANEL */
    .matchmaking-section{background:linear-gradient(135deg,var(--bg3) 0%,var(--bg2) 100%);border:2px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;animation:fadeIn 0.5s ease;box-shadow:0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.05);flex-shrink:1;overflow-y:auto;min-height:0}
    .matchmaking-panel-title{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;text-shadow:0 0 15px rgba(232,184,75,0.4);display:flex;align-items:center;gap:10px}
    .matchmaking-panel-title::before{content:'🎮';font-size:1.6rem}
    .matchmaking-phases{display:flex;flex-direction:column;gap:16px}
    .matchmaking-phase{background:rgba(17,20,32,0.8);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;animation:scaleIn 0.3s ease;box-shadow:0 4px 16px rgba(0,0,0,0.3);position:relative;overflow:hidden}
    .matchmaking-phase::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,var(--accent) 0%,var(--accent2) 100%)}
    .matchmaking-phase-header{font-size:1rem;font-weight:700;color:var(--accent);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;padding-left:10px;display:flex;align-items:center;gap:8px}
    .matchmaking-phase-header::before{content:'⚡';font-size:0.9rem}
    .matchmaking-phase-players{display:flex;flex-wrap:wrap;gap:6px}
    .matchmaking-phase-player{padding:4px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;font-size:0.85rem;color:var(--text2);animation:fadeIn 0.3s ease;transition:var(--transition);box-shadow:0 2px 8px rgba(0,0,0,0.2);position:relative}
    .mm-num{font-size:1.1rem;font-weight:800;color:var(--accent);margin-right:4px;display:inline-block;min-width:18px;text-align:center;text-shadow:0 0 8px rgba(232,184,75,0.5)}
    .matchmaking-phase-player:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px rgba(232,184,75,0.3)}
    .matchmaking-phase-player.in-both{border-color:var(--success);background:rgba(76,232,122,0.1);color:var(--success)}
    .matchmaking-phase-player.in-both::after{content:'✓';position:absolute;top:-6px;right:-6px;width:16px;height:16px;background:var(--success);border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;color:var(--bg);font-weight:700}
    .matchmaking-phase-player.skipped{border-color:var(--danger);background:rgba(232,76,76,0.1);color:var(--danger);opacity:0.7}
    .matchmaking-phase-player.skipped::after{content:'⏭';position:absolute;top:-6px;right:-6px;width:16px;height:16px;background:var(--danger);border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;color:var(--bg);font-weight:700}
    
    /* RANK UP EFFECT */
    #rankUpContainer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;display:flex;align-items:center;justify-content:center}
    .rank-up-effect{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Rajdhani',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:16px 24px;border-radius:24px;box-shadow:0 8px 32px rgba(232,184,75,.5);border:2px solid rgba(255,255,255,.1);color:#0a0c12;background:linear-gradient(135deg,var(--accent),var(--accent2));font-size:1.2rem;animation:globalRankUp 2.5s ease forwards}
    
    @media (max-width:1024px) {
      .right-panel{grid-template-rows:1fr;overflow:visible;min-height:auto}
    }
    
    /* INFOGRAPHIC PANEL */
    .info-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px 10px 10px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
    .info-progress-wrap{height:2px;background:var(--bg3);border-radius:2px;margin-bottom:8px;overflow:hidden;flex-shrink:0}
    .info-progress-bar{height:100%;background:var(--accent);border-radius:2px;width:0}
    .info-progress-bar.running{animation:igProgress 10s linear forwards}
    @keyframes igProgress{0%{width:0}100%{width:100%}}
    #infographic{flex:1;position:relative;overflow:hidden;min-height:0}
    .ig-slide{position:absolute;inset:0;display:flex;flex-direction:column;padding:2px 2px 0 2px;pointer-events:none}
    .ig-slide.enter{animation:igIn 0.5s cubic-bezier(0.4,0,0.2,1) forwards}
    .ig-slide.leave{animation:igOut 0.4s cubic-bezier(0.4,0,0.2,1) forwards}
    @keyframes igIn{from{opacity:0;transform:translateY(20px) scale(0.95)}to{opacity:1;transform:none}}
    @keyframes igOut{from{opacity:1;transform:none}to{opacity:0;transform:translateY(-15px) scale(0.95)}}
    .ig-label{font-size:0.58rem;letter-spacing:3px;text-transform:uppercase;color:var(--accent);opacity:0.65;margin-bottom:2px;flex-shrink:0}
    .ig-title{font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:700;color:#fff;margin-bottom:10px;letter-spacing:1px;flex-shrink:0}
    .ig-body{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:6px;min-height:0}
    .ig-empty{color:var(--text3);font-size:0.85rem;opacity:0.6;padding:16px 0}

    /* SLIDE: RANGLISTE */
    .ldb-row{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .ldb-pos{font-family:'Rajdhani',sans-serif;font-size:0.9rem;font-weight:700;width:22px;text-align:right;flex-shrink:0;color:var(--text3)}
    .ldb-pos.r1{color:#f1c40f}.ldb-pos.r2{color:#95a5a6}.ldb-pos.r3{color:#cd7f32}
    .ldb-name{width:68px;font-size:0.82rem;font-weight:600;color:var(--text);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .ldb-bar-wrap{flex:1;height:16px;background:var(--bg2);border-radius:3px;overflow:hidden}
    .ldb-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:width 0.9s cubic-bezier(0.4,0,0.2,1)}
    .ldb-pts{width:38px;font-size:0.78rem;font-weight:700;color:var(--accent);flex-shrink:0;text-align:right}

    /* SLIDE: LETZTE RUNDE */
    .lr-row{display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:7px;flex-shrink:0}
    .lr-p1{background:rgba(241,196,15,0.10);border:1px solid rgba(241,196,15,0.22)}
    .lr-p2{background:rgba(149,165,166,0.06);border:1px solid rgba(149,165,166,0.14)}
    .lr-p3{background:rgba(205,127,50,0.06);border:1px solid rgba(205,127,50,0.14)}
    .lr-pn{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06)}
    .lr-medal{font-size:1.1rem;width:24px;text-align:center;flex-shrink:0}
    .lr-name{flex:1;font-size:0.9rem;font-weight:600;color:var(--text)}
    .lr-delta{font-family:'Rajdhani',sans-serif;font-size:1.05rem;font-weight:700;flex-shrink:0}
    .lr-pos{color:#2ecc71}.lr-neg{color:#e74c3c}.lr-zero{color:var(--text3)}

    /* SLIDE: STREAKS */
    .sk-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;background:rgba(232,184,75,0.05);border:1px solid rgba(232,184,75,0.12);flex-shrink:0}
    .sk-icon{font-size:1.4rem;flex-shrink:0}
    .sk-name{flex:1;font-size:0.95rem;font-weight:600;color:var(--text)}
    .sk-num{font-family:'Rajdhani',sans-serif;font-size:1.55rem;font-weight:700;color:var(--accent);flex-shrink:0}
    .sk-lbl{font-size:0.65rem;color:var(--text3);margin-left:3px}

    /* SLIDE: PLATZIERUNGSVERTEILUNG */
    .pd-row{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .pd-name{width:58px;font-size:0.74rem;font-weight:600;text-align:right;color:var(--text2);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .pd-bar-wrap{flex:1;height:20px;display:flex;border-radius:4px;overflow:hidden;background:var(--bg2)}
    .pd-seg{display:flex;align-items:center;justify-content:center;font-size:0.63rem;font-weight:700;color:rgba(0,0,0,0.8);min-width:0;overflow:hidden}
    .pd-1{background:#f1c40f}.pd-2{background:#95a5a6}.pd-3{background:#cd7f32}.pd-4{background:#4a4a6a;color:rgba(255,255,255,0.8)}
    .pd-total{width:22px;font-size:0.65rem;color:var(--text3);flex-shrink:0;text-align:right}
    .pd-legend{display:flex;gap:8px;font-size:0.6rem;flex-shrink:0;padding-top:2px}
    .pd-legend span{opacity:0.8}

    /* SLIDE: Ø DELTA */
    .dlt-chart{flex:1;display:flex;align-items:flex-end;gap:4px;padding:24px 4px 18px;min-height:0}
    .dlt-col{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:0}
    .dlt-bar-pos{width:100%;border-radius:3px 3px 0 0;background:linear-gradient(180deg,#2ecc71,rgba(39,174,96,0.35));min-height:0}
    .dlt-bar-neg{width:100%;border-radius:0 0 3px 3px;background:linear-gradient(0deg,#e74c3c,rgba(231,76,60,0.35));min-height:0}
    .dlt-zero{width:100%;height:1px;background:var(--border);flex-shrink:0}
    .dlt-val{font-size:0.62rem;color:var(--accent);font-weight:700;text-align:center;white-space:nowrap}
    .dlt-name{font-size:0.6rem;color:var(--text3);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%}

    /* SLIDE: RANG-BILANZ */
    .rb-chart-outer{flex:1;overflow:auto;min-height:0}
    .rb-chart-head{display:flex;gap:2px;padding-left:60px;margin-bottom:2px}
    .rb-chart-hlbl{width:22px;font-size:0.56rem;color:var(--text3);text-align:center;flex-shrink:0}
    .rb-chart-row{display:flex;gap:2px;align-items:center;margin-bottom:2px}
    .rb-chart-lbl{width:56px;font-size:0.68rem;color:var(--text2);font-weight:600;text-align:right;padding-right:5px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .rb-chart-line{flex:1;height:40px;background:var(--bg2);border-radius:3px;overflow:hidden;position:relative}
    .rb-chart-line svg{width:100%;height:100%}
    .rb-chart-net{width:30px;font-size:0.68rem;font-weight:700;flex-shrink:0;text-align:right}

    /* SLIDE: HEATMAP */
    .hm-outer{flex:1;overflow:auto;min-height:0}
    .hm-head{display:flex;gap:2px;padding-left:60px;margin-bottom:2px}
    .hm-hlbl{width:22px;font-size:0.56rem;color:var(--text3);text-align:center;flex-shrink:0}
    .hm-row{display:flex;gap:2px;align-items:center;margin-bottom:2px}
    .hm-lbl{width:56px;font-size:0.68rem;color:var(--text2);font-weight:600;text-align:right;padding-right:5px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .hm-cell{width:22px;height:22px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:0.58rem;font-weight:700;flex-shrink:0}
    .hmc-1{background:#27ae60;color:rgba(0,0,0,0.75)}.hmc-2{background:#f1c40f;color:rgba(0,0,0,0.75)}
    .hmc-3{background:#e67e22;color:rgba(0,0,0,0.75)}.hmc-4{background:#e74c3c;color:rgba(255,255,255,0.9)}
    .hmc-empty{background:var(--bg2)}

    /* SLIDE: PUNKTEVERLAUF */
    .pv-chart-outer{flex:1;overflow:auto;min-height:0}
    .pv-chart-head{display:flex;gap:2px;padding-left:60px;margin-bottom:2px}
    .pv-chart-hlbl{width:22px;font-size:0.56rem;color:var(--text3);text-align:center;flex-shrink:0}
    .pv-chart-row{display:flex;gap:2px;align-items:center;margin-bottom:2px}
    .pv-chart-lbl{width:56px;font-size:0.68rem;color:var(--text2);font-weight:600;text-align:right;padding-right:5px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .pv-chart-line{flex:1;height:40px;background:var(--bg2);border-radius:3px;overflow:hidden;position:relative}
    .pv-chart-line svg{width:100%;height:100%}
    .pv-chart-final{width:30px;font-size:0.68rem;font-weight:700;flex-shrink:0;text-align:right;color:var(--accent)}

    /* SLIDE: AKTIVE RUNDE */
    .ar-row{display:flex;align-items:center;gap:10px;padding:7px 12px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);flex-shrink:0}
    .ar-idx{font-family:'Rajdhani',sans-serif;font-size:0.9rem;font-weight:700;color:var(--text3);width:18px;flex-shrink:0;text-align:right}
    .ar-name{flex:1;font-size:0.9rem;font-weight:600;color:var(--text)}
    .ar-pts{font-size:0.78rem;color:var(--text3);flex-shrink:0}
    .ar-pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);animation:arPulse 1.2s ease-in-out infinite;margin-right:4px}
    @keyframes arPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.3)}}

    /* HEATMAP */

      88%{transform:translate(-50%,-50%) scale(0.97) rotate(-0.3deg)}
      94%{opacity:1;transform:translate(-50%,-50%) scale(1.02) rotate(0deg)}
      98%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0deg)}
      100%{opacity:0;transform:translate(-50%,-1200%) scale(0) rotate(720deg);filter:hue-rotate(720deg) brightness(15) saturate(0)}
    }

      idleSlideIndex = 0;
      renderIdleSlide();
      startIdleSlideRotation();

      if(!idleModeActive) return;
      idleModeActive = false;
      document.getElementById('idleMode').style.display = 'none';
      document.getElementById('app').style.display = 'grid';
      document.getElementById('matchmakingOverlay').style.display = 'none';
      stopIdleSlideRotation();
      if(idleModeTimer){
        clearTimeout(idleModeTimer);
        idleModeTimer = null;
      }

    function startIdleSlideRotation(){
      stopIdleSlideRotation();
      idleSlideInterval = setInterval(() => {
        idleSlideIndex++;
        renderIdleSlide();
      }, IDLE_SLIDE_DURATION);
    }

    function stopIdleSlideRotation(){
      if(idleSlideInterval){
        clearInterval(idleSlideInterval);
        idleSlideInterval = null;

      const content = document.getElementById('idleContent');
      const slides = [

    function renderIdleWeeklyWinner(){
      const history = state.history || [];
      const oneWeekAgo = Date.now() - (7 * 24 * 60 * 60 * 1000);
      
      // Spieler-Statistiken für die letzte Woche berechnen
      const playerStats = {};
      history.forEach(log => {
        if(log.timestamp && log.timestamp > oneWeekAgo && log.results){
          log.results.forEach(result => {
            if(!playerStats[result.playerId]){
              playerStats[result.playerId] = {wins: 0, totalDelta: 0, name: result.name};
            }
            if(result.place === 1) playerStats[result.playerId].wins++;
            playerStats[result.playerId].totalDelta += result.delta || 0;
          });
        }
      });

      // Spieler nach Siegen sortieren
      const sortedPlayers = Object.values(playerStats).sort((a, b) => b.wins - a.wins || b.totalDelta - a.totalDelta);
      const winner = sortedPlayers[0];
      
      if(!winner){
        return `
          <div class="idle-slide">
            <div class="idle-progress"></div>
            <div class="idle-title">🏆 Gewinner der Woche</div>
            <div class="idle-subtitle">Noch keine Runden in dieser Woche gespielt</div>
          </div>
        `;
      }

      return `
        <div class="idle-slide">
          <div class="idle-progress"></div>
          <div class="idle-title">🏆 Gewinner der Woche</div>
          <div class="idle-subtitle">Beste Leistung der letzten 7 Tage</div>

    function renderIdleFunFact(){
      const facts = [];
      const players = state.players || [];
      const history = state.history || [];
      
      // Höchste Streak
      const maxStreakPlayer = players.reduce((max, p) => (p.maxStreak || 0) > (max.maxStreak || 0) ? p : max, players[0]);
      if(maxStreakPlayer && maxStreakPlayer.maxStreak > 0){
        facts.push(`🔥 ${maxStreakPlayer.name} hat die längste Streak mit ${maxStreakPlayer.maxStreak} Siegen in Folge!`);
      }
      
      // Meiste Siege
      const totalWins = {};
      history.forEach(log => {
        if(log.results){
          log.results.forEach(result => {
            if(result.place === 1){
              totalWins[result.playerId] = (totalWins[result.playerId] || 0) + 1;
            }
          });
        }
      });
      const topWinner = Object.entries(totalWins).sort((a, b) => b[1] - a[1])[0];
      if(topWinner){
        const winner = players.find(p => p.id === topWinner[0]);
        if(winner){
          facts.push(`🥇 ${winner.name} hat insgesamt ${topWinner[1]} Siege errungen!`);
        }
      }
      
      // Höchste Punktzahl
      const highestPointsPlayer = players.reduce((max, p) => p.points > max.points ? p : max, players[0]);
      if(highestPointsPlayer && highestPointsPlayer.points > 0){
        facts.push(`💎 ${highestPointsPlayer.name} führt mit ${highestPointsPlayer.points.toFixed(1)} Punkten!`);
      }
      
      // Durchschnittliche Punkte pro Runde
      if(players.length > 0 && history.length > 0){
        const avgPoints = players.reduce((sum, p) => sum + p.points, 0) / players.length;
        facts.push(`📊 Durchschnittlich ${avgPoints.toFixed(1)} Punkte pro Spieler!`);
      }
      
      // Zufälliger Fact auswählen
      const randomFact = facts[Math.floor(Math.random() * facts.length)] || '🎮 Viel Spaß beim Spielen!';
      
      return `
        <div class="idle-slide">
          <div class="idle-progress"></div>
          <div class="idle-title">✨ Wusstest du schon?</div>
          <div class="idle-fact">${randomFact}</div>
        </div>
      `;
    }

    function getLoss(p){return getRank(p.points).loss}
    function getRank(pts){let r=RANKS[0];for(const x of RANKS){if(pts>=x.points)r=x;else break}
      if(r.icon === 'gott' && pts >= 110) {
        const prestigeLevel = Math.floor((pts - 100) / 10);
        return {...r,name:`Gott<span class="prestige-box">P${prestigeLevel}</span>`,prestigeLevel:prestigeLevel,isPrestige:true};
      }
      return {...r,isPrestige:false};
    }
    function getMaxAccountsForSpieler(spielerKey){
      const accounts = state.players.filter(p=>p.key===spielerKey);
      if(!accounts.length) return 1;
      const bestPts = Math.max(...accounts.map(p=>Math.max(p.points||0, p.maxPoints||0)));
      if(bestPts >= 100) return 10;
      if(bestPts >= 76) return 7;
      if(bestPts >= 40) return 5;
      if(bestPts >= 19) return 3;
      if(bestPts >= 7)  return 2;
      return 1;
    }

    function getMmGroup(){
      const ps=state.players.filter(p=>p.active);
      if(ps.length<2)return null;
      const sorted=[...ps].sort((a,b)=>a.points-b.points);
      if(state.mmPhase==='low'){
        const base=sorted[0];
        const bi=getRankIdx(base.points);
        const g=sorted.filter(p=>getRankIdx(p.points)<=bi+2);
        return g.length>=2?g.map(p=>p.id):null;
      }else{
        const base=sorted[sorted.length-1];
        const bi=getRankIdx(base.points);
        const g=sorted.filter(p=>getRankIdx(p.points)>=bi-2);
        return g.length>=2?g.map(p=>p.id):null;
      }
    }

    function renderWinProbs() {
      const container = document.getElementById('winProbs');
      if (!container) return;

      // Use active players (p.active === true); fall back to currentRoundPIds if set
      const allPlayers = state.players || [];
      let activePlayers = allPlayers.filter(p => p.active === true);
      if (activePlayers.length === 0 && Array.isArray(state.currentRoundPIds) && state.currentRoundPIds.length > 0) {
        activePlayers = state.currentRoundPIds.map(id => allPlayers.find(p => p.id === id)).filter(Boolean);
      }

      if (activePlayers.length === 0) {
        container.innerHTML = '<div class="wp-label">GEWINNCHANCEN</div><div class="wp-empty">Keine aktiven Spieler</div>';
        return;
      }

      const history = state.history || [];

      // Group playing accounts by Spieler (key), fall back to account name if unassigned
      const spielerMap = {};
      activePlayers.forEach(acc => {
        const key = acc.key || acc.name;
        if (!spielerMap[key]) spielerMap[key] = { name: key, accounts: [] };
        spielerMap[key].accounts.push(acc);
      });

      // For each Spieler: sum ALL their accounts' points (not just the playing one)
      Object.keys(spielerMap).forEach(key => {
        const allAccs = (state.players || []).filter(p => (p.key || p.name) === key);
        spielerMap[key].totalPoints = allAccs.reduce((s, p) => s + (p.points || 0), 0);
        spielerMap[key].maxStreak   = Math.max(...spielerMap[key].accounts.map(a => a.streak || 0), 0);

        // Recent performance: average delta of last 5 rounds across all accounts of this Spieler
        const accNames = new Set(allAccs.map(a => a.name));
        let deltaSum = 0, deltaCount = 0;
        history.slice(0, 5).forEach(log => {
          if (log.skipped) return;
          (log.results || []).forEach(r => {
            if (accNames.has(r.name)) { deltaSum += (r.delta || 0); deltaCount++; }
          });
        });
        spielerMap[key].recentPerf = deltaCount > 0 ? deltaSum / deltaCount : 0;
      });

      // Score & percentages
      const spieler = Object.values(spielerMap).map(s => ({
        ...s,
        score: s.totalPoints + s.maxStreak * 2 + s.recentPerf * 0.5
      })).sort((a, b) => b.score - a.score);

      const totalScore = spieler.reduce((s, x) => s + Math.max(0, x.score), 0);
      const withPct = spieler.map(s => ({
        ...s,
        pct: totalScore > 0 ? Math.max(0, s.score) / totalScore * 100 : 100 / spieler.length
      }));

      // Render
      let html = '<div class="wp-label">GEWINNCHANCEN</div><div class="wp-rows">';
      withPct.forEach(s => {
        html += `<div class="wp-row"><div class="wp-name" title="${esc(s.name)}">${esc(s.name)}</div><div class="wp-pct">${s.pct.toFixed(1)}%</div></div>`;
      });
      html += '</div>';
      container.innerHTML = html;

      requestAnimationFrame(() => {
        container.querySelectorAll('.wp-bar').forEach(b => { b.style.width = b.dataset.pct + '%'; });
      });
    }

    function renderMatchmakingPhases() {
      if(!state.players || !Array.isArray(state.players)) return;
      const sortedPlayers = [...state.players].sort((a, b) => b.points - a.points || a.id - b.id);
      const matchmakingPhases = document.getElementById('matchmakingPhases');
      
      const currentPhase = state.mmPhase || 'low';
      const nextPhase = currentPhase === 'low' ? 'high' : 'low';
      
      const currentGroup = getMmGroup();
      const currentGroupIds = new Set(currentGroup || []);
      
      const currentPhasePlayers = sortedPlayers.filter(p => {
        if (!p.active) return false;
        const rankIdx = getRankIdx(p.points);
        if (currentPhase === 'low') {
          // Schlechtester Spieler + alle bis 2 Rang-Stufen drüber
          const lowest = sortedPlayers.filter(p => p.active).sort((a, b) => a.points - b.points)[0];
          const lowestIdx = lowest ? getRankIdx(lowest.points) : 0;
          return rankIdx <= lowestIdx + 2;
        } else {
          // Bester Spieler + alle bis 2 Rang-Stufen drunter
          const highest = sortedPlayers.filter(p => p.active).sort((a, b) => b.points - a.points)[0];
          const highestIdx = highest ? getRankIdx(highest.points) : 0;
          return rankIdx >= highestIdx - 2;
        }
      }).sort((a, b) => a.points - b.points);

      const nextPhasePlayers = sortedPlayers.filter(p => {
        if (!p.active) return false;
        const rankIdx = getRankIdx(p.points);
        if (nextPhase === 'low') {
          const lowest = sortedPlayers.filter(p => p.active).sort((a, b) => a.points - b.points)[0];
          const lowestIdx = lowest ? getRankIdx(lowest.points) : 0;
          return rankIdx <= lowestIdx + 2;
        } else {
          const highest = sortedPlayers.filter(p => p.active).sort((a, b) => b.points - a.points)[0];
          const highestIdx = highest ? getRankIdx(highest.points) : 0;
          return rankIdx >= highestIdx - 2;
        }
      }).sort((a, b) => a.points - b.points);
      
      matchmakingPhases.innerHTML = `
        <div class="matchmaking-phase">
          <div class="matchmaking-phase-header">Aktuell: ${currentPhase === 'low' ? 'Niedrige Liga' : 'Hohe Liga'}</div>
          <div class="matchmaking-phase-players">
            ${currentPhasePlayers.map((p, i) => {
              return `<div class="matchmaking-phase-player"><span class="mm-num">${i + 1}</span> ${p.name}</div>`;
            }).join('')}
          </div>
        </div>
        <div class="matchmaking-phase">
          <div class="matchmaking-phase-header">Nächste: ${nextPhase === 'low' ? 'Niedrige Liga' : 'Hohe Liga'}</div>
          <div class="matchmaking-phase-players">
            ${nextPhasePlayers.map((p, i) => {
              return `<div class="matchmaking-phase-player"><span class="mm-num">${i + 1}</span> ${p.name}</div>`;
            }).join('')}
          </div>
        </div>
      `;
    }

    function render() {
      if(!state) return;
      if(!state.players || !Array.isArray(state.players)) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'flex';
        document.getElementById('errorText').textContent = 'Keine Spieler-Daten gefunden';
        return;
      }
      
      resetIdleTimer(); // Aktivität bei Daten-Update zurücksetzen
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'grid';
      
      // Start infographic rotation
      if(!infographicInterval) {
        infographicInterval = setInterval(() => {
          currentInfographicIndex++;
          renderInfographics();
        }, 10000);
      }
      
      // Header elements removed
      
      // Matchmaking Phases
      renderMatchmakingPhases();

      // Win probabilities (always visible, per Spieler)
      renderWinProbs();
      
      // Ranklist
      const allPlayersSorted = [...state.players].sort((a, b) => b.points - a.points || a.id - b.id);
      const activePlayers = allPlayersSorted.filter(p => p.active !== false);
      const inactivePlayers = allPlayersSorted.filter(p => p.active === false);
      const ranklist = document.getElementById('ranklist');
      ranklist.innerHTML = '';
      
      // Show inactive players above the first active player
      if (activePlayers.length > 0) {
        const firstActiveRank = allPlayersSorted.findIndex(p => p.id === activePlayers[0].id);
        const playersAbove = allPlayersSorted.slice(0, firstActiveRank).filter(p => p.active === false);
        if (playersAbove.length > 0) {
          const aboveItem = document.createElement('div');
          aboveItem.className = 'rank-between';
          const playerNames = playersAbove.map(p => p.name).join(', ');
          aboveItem.innerHTML = `
            <div class="rank-between-count">${playersAbove.length} Spieler darüber</div>
            <div class="rank-between-names">(${playerNames})</div>
          `;
          ranklist.appendChild(aboveItem);
        }
      }

      activePlayers.forEach((player, index) => {
        const absoluteRank = allPlayersSorted.findIndex(p => p.id === player.id) + 1;
        // Dense ranking für gleiche Punkte - Spieler mit gleichen Punkten haben denselben Rang
        let displayRank = 1;
        for (let i = 0; i < allPlayersSorted.length; i++) {
          if (allPlayersSorted[i].id === player.id) {
            // Finde den ersten Spieler mit denselben Punkten
            for (let j = 0; j < i; j++) {
              if (allPlayersSorted[j].points === player.points) {
                displayRank = allPlayersSorted.findIndex(p => p.id === allPlayersSorted[j].id) + 1;
                break;
              }
            }
            if (displayRank === 1) {
              displayRank = i + 1;
            }
            break;
          }
        }
        const rank = getRank(player.points);
        const maxAccounts = getMaxAccountsForSpieler(player.key);
        const accounts = state.players.filter(p => p.key === player.key).length;
        
        const item = document.createElement('div');
        item.className = 'rank-item';
        const rankIconClass = 'rank-' + rank.icon.toLowerCase();
        item.innerHTML = `
          <div class="rank-number">${displayRank}.</div>
          <div class="rl-icon-outer" style="border-color:${rank.color}">
            <div class="rank-icon ${rankIconClass}"></div>
          </div>
          <div class="rank-info">
            <div class="rank-name">
              ${player.name}
              <span class="rank-badge" style="background:${rank.color};color:${rank.color === '#0a0a0a' || rank.color.includes('gradient') ? '#fff' : '#000'}">${rank.name}</span>
            </div>
            <div>
              <span class="rank-points">${player.points}</span>
              <span class="rank-max">(${player.maxPoints || player.points || 0})</span>
              <span class="rank-streak">🔥 ${player.streak || 0}</span>
              <span class="rank-accounts">${accounts}/${maxAccounts}</span>
            </div>
          </div>
        `;
        ranklist.appendChild(item);
        
        // Inaktive Spieler zwischen aktiven Spielern anzeigen
        const nextActivePlayer = activePlayers[index + 1];
        if (nextActivePlayer) {
          const currentRank = allPlayersSorted.findIndex(p => p.id === player.id);
          const nextRank = allPlayersSorted.findIndex(p => p.id === nextActivePlayer.id);
          const playersBetween = allPlayersSorted.slice(currentRank + 1, nextRank).filter(p => p.active === false);
          
          if (playersBetween.length > 0) {
            const betweenItem = document.createElement('div');
            betweenItem.className = 'rank-between';
            const playerNames = playersBetween.map(p => p.name).join(', ');
            betweenItem.innerHTML = `
              <div class="rank-between-count">${playersBetween.length} Spieler dazwischen</div>
              <div class="rank-between-names">(${playerNames})</div>
            `;
            ranklist.appendChild(betweenItem);
          }
        } else {
          // Last active player — show inactive players below
          const lastActiveRank = allPlayersSorted.findIndex(p => p.id === player.id);
          const playersBelowLast = allPlayersSorted.slice(lastActiveRank + 1).filter(p => p.active === false);
          if (playersBelowLast.length > 0) {
            const belowItem = document.createElement('div');
            belowItem.className = 'rank-between';
            const playerNames = playersBelowLast.map(p => p.name).join(', ');
            belowItem.innerHTML = `
              <div class="rank-between-count">${playersBelowLast.length} Spieler dadrunter</div>
              <div class="rank-between-names">(${playerNames})</div>
            `;
            ranklist.appendChild(belowItem);
          }
        }
      });
      
      // Auto-scroll für Rangliste wenn zu viele Elemente (inklusive rank-between)
      const totalItems = ranklist ? ranklist.querySelectorAll('.rank-item, .rank-between').length : 0;
      if (totalItems > 5) {
        if (!window.ranklistScrollInterval) {
          window.ranklistScrollIndex = 0;
          window.ranklistScrollDirection = 1; // 1 = runter, -1 = hoch
          window.ranklistScrollInterval = setInterval(() => {
            const ranklist = document.getElementById('ranklist');
            if (!ranklist) {
              clearInterval(window.ranklistScrollInterval);
              window.ranklistScrollInterval = null;
              return;
            }
            const items = ranklist.querySelectorAll('.rank-item, .rank-between');
            if (items.length === 0) {
              window.ranklistScrollIndex = 0;
              return;
            }
            
            const currentItem = items[window.ranklistScrollIndex];
            if (currentItem) {
              currentItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            
            // Richtung umkehren wenn am Ende oder am Anfang
            if (window.ranklistScrollDirection === 1 && window.ranklistScrollIndex >= items.length - 1) {
              window.ranklistScrollDirection = -1;
            } else if (window.ranklistScrollDirection === -1 && window.ranklistScrollIndex <= 0) {
              window.ranklistScrollDirection = 1;
            }
            
            window.ranklistScrollIndex += window.ranklistScrollDirection;
          }, 3000);
        }
      }
      
      // Infographics
      renderInfographics();
      
      // Check for rank-ups
      checkRankUps();
    }

    function renderInfographics() {
      // Debounce - verhindert Race Conditions bei schnellen Updates
      if (infographicRenderTimeout) {
        clearTimeout(infographicRenderTimeout);
      }
      infographicRenderTimeout = setTimeout(() => {
        renderInfographicsInternal();
      }, 50);
    }

    function renderInfographicsInternal() {
      if(!state.players || !Array.isArray(state.players)) return;
      const infographic = document.getElementById('infographic');
      if (!infographic) return;

      const allSorted = [...state.players].sort((a, b) => b.points - a.points || a.id - b.id);
      const active = allSorted.filter(p => p.active !== false);
      const history = state.history || [];
      const hasRound = Array.isArray(state.currentRoundPIds) && state.currentRoundPIds.length > 0;

      // Build slide list dynamically — skip history-based slides when no history
      const slides = ['leaderboard', 'streaks'];
      if (history.length > 0) slides.push('last-round');
      slides.push('plac-dist');
      if (history.length > 0) slides.push('delta', 'rang-bilanz', 'punkte-verlauf', 'heatmap');
      if (hasRound) slides.push('active-round');

      const idx = currentInfographicIndex % slides.length;
      const slide = slides[idx];

      // Progress bar restart
      const bar = document.getElementById('infoProgressBar');
      if (bar) {
        bar.classList.remove('running');
        void bar.offsetWidth; // force reflow
        bar.classList.add('running');
      }

      // Build slide HTML & data
      const el = document.createElement('div');
      el.className = 'ig-slide';

      const LABELS = {
        leaderboard: 'RANGLISTE',
        'last-round': 'LETZTE RUNDE',
        streaks:      'STREAK-FEUER',
        'plac-dist':  'PLATZIERUNGEN',
        delta:        'Ø PUNKTE-DELTA',
        'rang-bilanz':'RANG-BILANZ',
        'punkte-verlauf': 'PUNKTEVERLAUF',
        heatmap:      'HEATMAP',
        'active-round':'AKTIVE RUNDE',
      };
      const TITLES = {
        leaderboard:  'Aktuelle Rangliste',
        'last-round': 'Runde ' + (history[0]?.round || ''),
        streaks:      'Streak-Könige 🔥',
        'plac-dist':  'Platzierungsverteilung',
        delta:        'Ø Punkte pro Runde',
        'rang-bilanz':'Rang Auf / Abstieg',
        'punkte-verlauf': 'Kumulierter Punkteverlauf',
        heatmap:      'Platzierungs-Heatmap',
        'active-round':'Runde läuft gerade',
      };

      el.innerHTML = `<div class="ig-label">${LABELS[slide]||''}</div><div class="ig-title">${TITLES[slide]||''}</div><div class="ig-body" id="ig-body"></div>`;

      // Transition: remove all old slides immediately to prevent overlaps
      const oldSlides = infographic.querySelectorAll('.ig-slide');
      oldSlides.forEach(old => old.remove());
      
      infographic.appendChild(el);
      requestAnimationFrame(() => el.classList.add('enter'));

      const body = el.querySelector('#ig-body');

      // ── LEADERBOARD ──────────────────────────────────────────
      if (slide === 'leaderboard') {
        const maxPts = Math.max(...active.map(p => p.points), 1);
        active.slice(0, 10).forEach((p, i) => {
          const pct = Math.max(4, (p.pts || p.points) / maxPts * 100);
          const row = document.createElement('div');
          row.className = 'ldb-row';
          const posClass = i===0?'r1':i===1?'r2':i===2?'r3':'';
          row.innerHTML = `<div class="ldb-pos ${posClass}">${i+1}</div><div class="ldb-name" title="${p.name}">${p.name}</div><div class="ldb-bar-wrap"><div class="ldb-bar" data-pct="${pct}"></div></div><div class="ldb-pts">${p.points}</div>`;
          body.appendChild(row);
        });
        // Animate bars after paint
        requestAnimationFrame(() => {
          body.querySelectorAll('.ldb-bar').forEach(b => { b.style.width = b.dataset.pct + '%'; });
        });
      }

      // ── LETZTE RUNDE ─────────────────────────────────────────
      else if (slide === 'last-round') {
        const log = history[0];
        if (!log || !log.results || log.results.length === 0) {
          body.innerHTML = '<div class="ig-empty">Noch keine Runden gespielt</div>';
        } else {
          const medals = ['🥇','🥈','🥉'];
          [...log.results].sort((a,b)=>a.place-b.place).forEach(r => {
            const d = r.delta || 0;
            const dc = d>0?'lr-pos':d<0?'lr-neg':'lr-zero';
            const cls = r.place===1?'lr-p1':r.place===2?'lr-p2':r.place===3?'lr-p3':'lr-pn';
            const row = document.createElement('div');
            row.className = `lr-row ${cls}`;
            row.innerHTML = `<div class="lr-medal">${medals[r.place-1]||''}</div><div class="lr-name">${esc(r.name)}</div><div class="lr-delta ${dc}">${d>0?'+':''}${d} Pkt</div>`;
            body.appendChild(row);
          });
        }
      }

      // ── STREAKS ───────────────────────────────────────────────
      else if (slide === 'streaks') {
        const withStreak = active.filter(p => p.streak > 0).sort((a,b) => b.streak - a.streak);
        if (withStreak.length === 0) {
          body.innerHTML = '<div class="ig-empty">Noch keine aktiven Streaks</div>';
        } else {
          withStreak.slice(0, 5).forEach(p => {
            const row = document.createElement('div');
            row.className = 'sk-row';
            row.innerHTML = `<div class="sk-icon">🔥</div><div class="sk-name">${esc(p.name)}</div><div class="sk-num">${p.streak}<span class="sk-lbl">Wins</span></div>`;
            body.appendChild(row);
          });
        }
      }

      // ── PLATZIERUNGSVERTEILUNG ────────────────────────────────
      else if (slide === 'plac-dist') {
        const pmap = {};
        active.forEach(p => { pmap[p.id] = {name:p.name, c1:0, c2:0, c3:0, c4:0, total:0}; });
        history.forEach(rnd => {
          (rnd.results||[]).forEach(r => {
            const p = state.players.find(pl => pl.name===r.name);
            if (!p || !pmap[p.id]) return;
            pmap[p.id].total++;
            if(r.place===1) pmap[p.id].c1++;
            else if(r.place===2) pmap[p.id].c2++;
            else if(r.place===3) pmap[p.id].c3++;
            else pmap[p.id].c4++;
          });
        });
        const rows = Object.values(pmap).filter(r=>r.total>0).sort((a,b)=>b.c1-a.c1||b.total-a.total);
        if (rows.length === 0) {
          body.innerHTML = '<div class="ig-empty">Noch keine Rundenhistorie</div>';
        } else {
          rows.forEach(r => {
            const t = r.total;
            const w1=(r.c1/t*100).toFixed(0), w2=(r.c2/t*100).toFixed(0), w3=(r.c3/t*100).toFixed(0), w4=(r.c4/t*100).toFixed(0);
            const row = document.createElement('div');
            row.className = 'pd-row';
            row.innerHTML = `<div class="pd-name" title="${r.name}">${r.name.substring(0,8)}</div><div class="pd-bar-wrap">${r.c1>0?`<div class="pd-seg pd-1" style="width:${w1}%">${r.c1}</div>`:''  }${r.c2>0?`<div class="pd-seg pd-2" style="width:${w2}%">${r.c2}</div>`:''  }${r.c3>0?`<div class="pd-seg pd-3" style="width:${w3}%">${r.c3}</div>`:''  }${r.c4>0?`<div class="pd-seg pd-4" style="width:${w4}%">${r.c4}</div>`:''  }</div><div class="pd-total">${t}</div>`;
            body.appendChild(row);
          });
          const leg = document.createElement('div');
          leg.className = 'pd-legend';
          leg.innerHTML = '<span style="color:#f1c40f">■ 1.</span><span style="color:#95a5a6">■ 2.</span><span style="color:#cd7f32">■ 3.</span><span style="color:#8888aa">■ 4+</span>';
          body.appendChild(leg);
        }
      }

      // ── Ø DELTA ───────────────────────────────────────────────
      else if (slide === 'delta') {
        const dmap = {};
        active.forEach(p => { dmap[p.id] = {name:p.name, sum:0, count:0}; });
        history.forEach(rnd => {
          (rnd.results||[]).forEach(r => {
            const p = state.players.find(pl => pl.name===r.name);
            if(!p || !dmap[p.id]) return;
            dmap[p.id].sum += (r.delta||0);
            dmap[p.id].count++;
          });
        });
        const rows = Object.values(dmap).filter(r=>r.count>0).map(r=>({...r, avg:r.sum/r.count})).sort((a,b)=>b.avg-a.avg);
        if (rows.length === 0) {
          body.innerHTML = '<div class="ig-empty">Noch keine Rundenhistorie</div>';
        } else {
          const chart = document.createElement('div');
          chart.className = 'dlt-chart';
          const maxAbs = Math.max(...rows.map(r=>Math.abs(r.avg)), 0.01);
          const H = 90;
          rows.slice(0,10).forEach(r => {
            const ph = r.avg>0 ? Math.round(r.avg/maxAbs*H) : 0;
            const nh = r.avg<0 ? Math.round(Math.abs(r.avg)/maxAbs*H) : 0;
            const col = document.createElement('div');
            col.className = 'dlt-col';
            col.innerHTML = `<div class="dlt-val">${r.avg>=0?'+':''}${r.avg.toFixed(1)}</div><div class="dlt-bar-pos" style="height:${ph}px"></div><div class="dlt-zero"></div><div class="dlt-bar-neg" style="height:${nh}px"></div><div class="dlt-name" title="${r.name}">${r.name.substring(0,6)}</div>`;
            chart.appendChild(col);
          });
          body.appendChild(chart);
        }
      }

      // ── RANG-BILANZ ───────────────────────────────────────────
      else if (slide === 'rang-bilanz') {
        const rounds = [...history].filter(r=>r.results&&r.results.length>0).slice(-10).sort((a,b)=>a.round-b.round);
        if (rounds.length === 0) {
          body.innerHTML = '<div class="ig-empty">Noch keine Rang-Änderungen</div>';
        } else {
          const outer = document.createElement('div');
          outer.className = 'rb-chart-outer';
          const head = document.createElement('div');
          head.className = 'rb-chart-head';
          rounds.forEach(r => { const l=document.createElement('div');l.className='rb-chart-hlbl';l.textContent='R'+r.round;head.appendChild(l); });
          outer.appendChild(head);
          const seen = new Set();
          rounds.forEach(r=>r.results.forEach(res=>{const p=state.players.find(pl=>pl.name===res.name);if(p)seen.add(p.id);}));
          allSorted.filter(p=>seen.has(p.id)).forEach(player => {
            const row = document.createElement('div');
            row.className = 'rb-chart-row';
            const lbl = document.createElement('div');
            lbl.className = 'rb-chart-lbl'; lbl.title = player.name; lbl.textContent = player.name.substring(0,7);
            row.appendChild(lbl);
            let netChange = 0;
            const points = [];
            rounds.forEach(rnd => {
              const res = rnd.results.find(r=>r.name===player.name);
              if (res) {
                const change = (res.rankUp ? 1 : 0) - (res.rankDown ? 1 : 0);
                netChange += change;
                points.push(netChange);
              } else {
                points.push(netChange);
              }
            });
            const minP = Math.min(...points);
            const maxP = Math.max(...points);
            const range = maxP - minP || 1;
            const chart = document.createElement('div');
            chart.className = 'rb-chart-line';
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('viewBox', `0 0 ${points.length} 40`);
            svg.setAttribute('preserveAspectRatio', 'none');
            const polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
            const linePoints = points.map((p, i) => {
              const x = (i / (points.length - 1 || 1)) * 100;
              const y = 40 - ((p - minP) / range) * 40;
              return `${x},${y}`;
            }).join(' ');
            polyline.setAttribute('points', linePoints);
            polyline.setAttribute('fill', 'none');
            polyline.setAttribute('stroke', netChange >= 0 ? '#2ecc71' : '#e74c3c');
            polyline.setAttribute('stroke-width', '2');
            polyline.setAttribute('stroke-linecap', 'round');
            polyline.setAttribute('stroke-linejoin', 'round');
            svg.appendChild(polyline);
            chart.appendChild(svg);
            const netLabel = document.createElement('div');
            netLabel.className = 'rb-chart-net';
            netLabel.textContent = netChange > 0 ? `+${netChange}` : netChange;
            netLabel.style.color = netChange >= 0 ? '#2ecc71' : '#e74c3c';
            row.appendChild(chart);
            row.appendChild(netLabel);
            outer.appendChild(row);
          });
          body.appendChild(outer);
        }
      }

      // ── PUNKTEVERLAUF ──────────────────────────────────────────
      else if (slide === 'punkte-verlauf') {
        const rounds = [...history].filter(r=>r.results&&r.results.length>0).slice(-10).sort((a,b)=>a.round-b.round);
        if (rounds.length === 0) {
          body.innerHTML = '<div class="ig-empty">Noch keine Rundenhistorie</div>';
        } else {
          const outer = document.createElement('div');
          outer.className = 'pv-chart-outer';
          const head = document.createElement('div');
          head.className = 'pv-chart-head';
          rounds.forEach(r => { const l=document.createElement('div');l.className='pv-chart-hlbl';l.textContent='R'+r.round;head.appendChild(l); });
          outer.appendChild(head);
          const seen = new Set();
          rounds.forEach(r=>r.results.forEach(res=>{const p=state.players.find(pl=>pl.name===res.name);if(p)seen.add(p.id);}));
          const playerData = [];
          allSorted.filter(p=>seen.has(p.id)).forEach(player => {
            let cumPoints = 0;
            const points = [];
            rounds.forEach(rnd => {
              const res = rnd.results.find(r=>r.name===player.name);
              if (res) {
                cumPoints += (res.delta || 0);
                points.push(cumPoints);
              } else {
                points.push(cumPoints);
              }
            });
            playerData.push({ player, points });
          });
          const allPoints = playerData.flatMap(p => p.points);
          const minP = Math.min(...allPoints, 0);
          const maxP = Math.max(...allPoints, 0);
          const range = maxP - minP || 1;
          playerData.forEach(({ player, points }) => {
            const row = document.createElement('div');
            row.className = 'pv-chart-row';
            const lbl = document.createElement('div');
            lbl.className = 'pv-chart-lbl'; lbl.title = player.name; lbl.textContent = player.name.substring(0,7);
            row.appendChild(lbl);
            const chart = document.createElement('div');
            chart.className = 'pv-chart-line';
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('viewBox', `0 0 ${points.length} 40`);
            svg.setAttribute('preserveAspectRatio', 'none');
            const polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
            const linePoints = points.map((p, i) => {
              const x = (i / (points.length - 1 || 1)) * 100;
              const y = 40 - ((p - minP) / range) * 40;
              return `${x},${y}`;
            }).join(' ');
            polyline.setAttribute('points', linePoints);
            polyline.setAttribute('fill', 'none');
            polyline.setAttribute('stroke', 'var(--accent)');
            polyline.setAttribute('stroke-width', '2');
            polyline.setAttribute('stroke-linecap', 'round');
            polyline.setAttribute('stroke-linejoin', 'round');
            svg.appendChild(polyline);
            chart.appendChild(svg);
            const finalLabel = document.createElement('div');
            finalLabel.className = 'pv-chart-final';
            finalLabel.textContent = points[points.length - 1].toFixed(1);
            row.appendChild(chart);
            row.appendChild(finalLabel);
            outer.appendChild(row);
          });
          body.appendChild(outer);
        }
      }

      // ── HEATMAP ───────────────────────────────────────────────
      else if (slide === 'heatmap') {
        const rounds = [...history].filter(r=>r.results&&r.results.length>0).slice(-10).sort((a,b)=>a.round-b.round);
        if (rounds.length === 0) {
          body.innerHTML = '<div class="ig-empty">Noch keine Rundenhistorie</div>';
        } else {
          const outer = document.createElement('div');
          outer.className = 'hm-outer';
          const head = document.createElement('div');
          head.className = 'hm-head';
          rounds.forEach(r => { const l=document.createElement('div');l.className='hm-hlbl';l.textContent='R'+r.round;head.appendChild(l); });
          outer.appendChild(head);
          const seen = new Set();
          rounds.forEach(r=>r.results.forEach(res=>{const p=state.players.find(pl=>pl.name===res.name);if(p)seen.add(p.id);}));
          allSorted.filter(p=>seen.has(p.id)).forEach(player => {
            const row = document.createElement('div');
            row.className = 'hm-row';
            const lbl = document.createElement('div');
            lbl.className = 'hm-lbl'; lbl.title = player.name; lbl.textContent = player.name.substring(0,7);
            row.appendChild(lbl);
            rounds.forEach(rnd => {
              const res = rnd.results.find(r=>r.name===player.name);
              const cell = document.createElement('div');
              if (res) { const pl=res.place; cell.className='hm-cell '+(pl===1?'hmc-1':pl===2?'hmc-2':pl===3?'hmc-3':'hmc-4'); cell.textContent=pl; }
              else { cell.className='hm-cell hmc-empty'; }
              row.appendChild(cell);
            });
            outer.appendChild(row);
          });
          body.appendChild(outer);
        }
      }

      // ── AKTIVE RUNDE ──────────────────────────────────────────
      else if (slide === 'active-round') {
        const pIds = state.currentRoundPIds || [];
        pIds.forEach((id, i) => {
          const p = state.players.find(pl=>pl.id===id);
          if (!p) return;
          const row = document.createElement('div');
          row.className = 'ar-row';
          row.innerHTML = `<div class="ar-idx">${i+1}</div><div class="ar-name">${esc(p.name)}</div><div class="ar-pts">${p.points} Pkt</div>`;
          body.appendChild(row);
        });
        // Pulsing indicator at top
        const pulse = document.createElement('div');
        pulse.style.cssText = 'display:flex;align-items:center;gap:6px;font-size:0.72rem;color:var(--accent);margin-bottom:4px;flex-shrink:0;order:-1';
        pulse.innerHTML = '<div class="ar-pulse"></div>Live — Runde läuft';
        body.prepend(pulse);
      }
    }



    function showRoundEndPopup(log) {
      const results = (log.results || []).slice().sort((a,b) => a.place - b.place);
      if(results.length === 0 && !log.skipped) return;

      // previousRanks mit Rängen vor dieser Runde initialisieren
      state.players.forEach(player => {
        if (!player.active) return;
        const res = results.find(r => r.name === player.name);
        if (res) {
          const oldPoints = res.oldPoints || 0;
          previousRanks[player.id] = getRank(oldPoints);
        }
      });

      isPopupShowing = true;

      const overlay = document.createElement('div');
      overlay.className = 'round-end-overlay';

      const card = document.createElement('div');
      card.className = 'round-end-card';

      const titleEl = document.createElement('div');
      titleEl.className = 'round-end-title';
      titleEl.textContent = log.skipped ? 'RUNDE ÜBERSPRUNGEN' : 'RUNDE ABGESCHLOSSEN';
      card.appendChild(titleEl);

      const roundEl = document.createElement('div');
      roundEl.className = 'round-end-round';
      roundEl.textContent = 'Runde ' + log.round;
      card.appendChild(roundEl);

      if(log.skipped) {
        const skipMsg = document.createElement('div');
        skipMsg.style.cssText = 'text-align:center;color:var(--text3);font-size:1rem;margin-top:8px;padding:16px;border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,0.03)';
        skipMsg.innerHTML = `⚡ ${esc(log.skippedPhase || 'Liga')} übersprungen<br><span style="font-size:0.8rem;opacity:0.6">Zu wenig passende Spieler in Rangreichweite</span>`;
        card.appendChild(skipMsg);
        overlay.appendChild(card);
        document.body.appendChild(overlay);
        setTimeout(() => { card.classList.add('out'); setTimeout(() => { overlay.remove(); isPopupShowing = false; }, 700); }, 4000);
        return;
      }

      const medals = ['🥇','🥈','🥉'];
      results.forEach((r, i) => {
        const row = document.createElement('div');
        const cls = r.place===1?'p1':r.place===2?'p2':r.place===3?'p3':'pn';
        row.className = `round-end-row ${cls}`;
        row.style.animationDelay = (0.1 + i * 0.1) + 's';
        const delta = r.delta || 0;
        const deltaClass = delta > 0 ? 'pos' : delta < 0 ? 'neg' : 'zero';
        const deltaStr = delta > 0 ? '+' + delta : String(delta);
        row.innerHTML = `
          <div class="re-medal">${medals[r.place-1] || ''}</div>
          <div class="re-place">#${r.place}</div>
          <div class="re-name">${esc(r.name)}</div>
          <div class="re-delta ${deltaClass}">${deltaStr} Pkt</div>
        `;
        card.appendChild(row);
      });

      overlay.appendChild(card);
      document.body.appendChild(overlay);

      // Particles
      createParticles('gold', 30);
      setTimeout(() => createParticles('gold', 20), 600);

      // Dismiss after 8s
      const TOTAL = 8000;
      setTimeout(() => {
        card.classList.add('out');
        setTimeout(() => {
          overlay.remove();
          isPopupShowing = false;
          // Rank-Up-Effekte nach Popup-Dismiss auslösen
          state.players.forEach(player => {
            if (!player.active) return;
            const currentRank = getRank(player.points);
            const previousRank = previousRanks[player.id];
            if (previousRank && previousRank.points < currentRank.points) {
              animateRankUp(player.id);
            }
            previousRanks[player.id] = currentRank;
          });
        }, 700);
      }, TOTAL);
    }

    function loadState() {
      db.collection('rangspiel_data').doc('main_data')
        .onSnapshot((doc) => {
          if(doc.exists) {
            const data = doc.data();
            state = data.state || data; // Firebase data is nested in 'state' property
            // Round-end popup
            const newRound = state.round || 0;
            if(lastShownRound >= 0 && newRound > lastShownRound && state.history && state.history.length > 0 && !isPopupShowing) {
              const latestLog = state.history[0];
              if(latestLog && (latestLog.skipped || (latestLog.results && latestLog.results.length > 0))) {
                showRoundEndPopup(latestLog);
              }
            }
            lastShownRound = newRound;
            render();
          } else {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'flex';
            document.getElementById('errorText').textContent = 'Keine Daten gefunden - Dokument existiert nicht';
          }
        }, (error) => {
          console.error('Firebase error:', error);
          document.getElementById('loading').style.display = 'none';
          document.getElementById('error').style.display = 'flex';
          document.getElementById('errorText').textContent = 'Fehler: ' + error.message;
        });
      
      db.collection('global_badges').doc('badges')
        .onSnapshot((doc) => {
          if(doc.exists) {
            globalBadges = doc.data().data || {};
          }
        });
    }

    auth.signInAnonymously().catch((error) => {
      console.error('Auth error:', error);
    });

    loadState();
    startIdleMonitoring();
  </script>
</body>
</html>
