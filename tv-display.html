<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * {
      touch-action: manipulation;
    }
  </style>
  <title>Rangspiel - TV Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
 ()      --bg:#0a0c12; --bg2:#111420; --bg3:#181c2a; --border:#2a3048;
      --accent:#e8b84b; --accent2:#c97a2f; --text:#e8eaf0; --text2:#7c839f; --text3:#4a5070;
      --success:#4ce87a; --danger:#e84c4c;
      --radius:12px; --radius-sm:8px; --transition:0.3s ease;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px;-webkit-tap-highlight-color:transparent;background:#0a0c12}
    body{background:#0a0c12;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-weight:400;min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% -10%,rgba(232,184,75,.06) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 110%,rgba(201,122,47,.05) 0%,transparent 50%);pointer-events:none;z-index:0}
    
    .app{max-width:1400px;margin:0 auto;position:relative;z-index:1;padding:20px;height:100vh;display:grid;grid-template-columns:1fr 1fr;gap:10px;max-height:100vh;overflow:hidden;background:#0a0c12}
    
    @media (max-width:1024px) {
      .app{grid-template-columns:1fr;grid-template-rows:auto 1fr 1fr;gap:15px;padding:15px;height:auto;max-height:none;overflow:visible}
    }
    
    /* HEADER */
    .header{grid-column:1/-1;padding:5px 15px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,var(--bg2) 0%,transparent 100%);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:var(--radius)}
    .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
    .logo{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase}
    .logo span{color:var(--text2)}
    .header-right{display:flex;align-items:center;gap:12px}
    .round-badge{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:6px 16px;font-size:1rem;font-weight:600;color:var(--text2);letter-spacing:1px;text-transform:uppercase}
    .round-badge em{color:var(--accent);font-style:normal}
    .mm-toggle{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:0.9rem;font-weight:700;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;transition:var(--transition)}
    .mm-toggle.on{border-color:rgba(232,184,75,.4);color:var(--accent);background:rgba(232,184,75,.08)}
    .mm-dot{width:10px;height:10px;border-radius:50%;background:var(--text3);transition:var(--transition)}
    .mm-toggle.on .mm-dot{background:var(--accent);box-shadow:0 0 8px var(--accent)}
    
    /* LEFT PANEL - RANKLIST */
    .left-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:0 8px 8px 8px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
    .panel-title{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;color:var(--accent);letter-spacing:1px;margin-bottom:6px;text-transform:uppercase;padding:4px 0;text-shadow:0 0 10px rgba(232,184,75,0.3)}
    
    .ranklist{flex:1;overflow-y:auto;padding-right:10px}
    .ranklist::-webkit-scrollbar{width:6px}
    .ranklist::-webkit-scrollbar-track{background:var(--bg3);border-radius:3px}
    .ranklist::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    .ranklist::-webkit-scrollbar-thumb:hover{background:var(--text3)}
    
    .rank-item{display:flex;align-items:center;padding:14px 16px;margin-bottom:10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);transition:var(--transition);animation:fadeIn 0.3s ease;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
    .rank-item:hover{border-color:rgba(232,184,75,.5);transform:translateX(4px);box-shadow:0 4px 16px rgba(232,184,75,.15)}
    .rank-number{font-family:'Rajdhani',sans-serif;font-size:1.8rem;font-weight:700;color:var(--accent);width:40px;text-align:center}
    .rank-between{padding:8px 12px;margin:8px 0;background:rgba(232,184,75,0.05);border-left:3px solid var(--accent);border-radius:var(--radius-sm);animation:fadeIn 0.3s ease}
    .rank-between-count{font-size:0.85rem;color:var(--accent);font-weight:600;margin-bottom:4px}
    .rank-between-names{font-size:0.75rem;color:var(--text3)}
    
    /* INACTIVE LIST */
    .inactive-list{flex:1;overflow-y:auto;max-height:200px;padding-right:8px}
    .inactive-list::-webkit-scrollbar{width:4px}
    .inactive-list::-webkit-scrollbar-track{background:var(--bg3);border-radius:2px}
    .inactive-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;margin-bottom:4px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);opacity:0.6;font-size:0.75rem}
    .inactive-name{font-size:0.75rem;color:var(--text2)}
    .inactive-points{font-size:0.7rem;color:var(--text3)}
    
    /* MATCHMAKING LIST */
    .matchmaking-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
    .matchmaking-section{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px}
    .matchmaking-phase-title{font-size:1rem;font-weight:600;color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
    .matchmaking-players{display:flex;flex-wrap:wrap;gap:6px}
    .matchmaking-player{padding:4px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.85rem;color:var(--text2)}
    .rank-icon{display:inline-block;width:40px;height:40px;border-radius:50%;background-size:contain;background-repeat:no-repeat;background-position:center;flex-shrink:0;margin-right:0}
    .rank-info{flex:1}
    .rank-name{font-size:1.3rem;font-weight:600;margin-bottom:4px}
    .rank-badge{display:inline-block;padding:4px 10px;border-radius:4px;font-size:0.9rem;font-weight:600;text-transform:uppercase;margin-left:8px}
    .rank-points{font-size:1.1rem;color:var(--success);font-weight:600}
    .rank-max{color:var(--text3);font-size:0.95rem;margin-left:6px}
    .rank-streak{color:var(--accent);font-size:1rem;margin-left:12px}
    .rank-accounts{color:var(--text2);font-size:0.9rem;margin-left:8px}
    
    /* RIGHT PANEL */
    .right-panel{display:grid;grid-template-rows:1fr;gap:20px;overflow:hidden;min-height:0}
    
    /* MATCHMAKING PANEL */
    .matchmaking-section{background:linear-gradient(135deg,var(--bg3) 0%,var(--bg2) 100%);border:2px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;animation:fadeIn 0.5s ease;box-shadow:0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.05)}
    .matchmaking-panel-title{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;text-shadow:0 0 15px rgba(232,184,75,0.4);display:flex;align-items:center;gap:10px}
    .matchmaking-panel-title::before{content:'🎮';font-size:1.6rem}
    .matchmaking-phases{display:flex;flex-direction:column;gap:16px}
    .matchmaking-phase{background:rgba(17,20,32,0.8);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;animation:scaleIn 0.3s ease;box-shadow:0 4px 16px rgba(0,0,0,0.3);position:relative;overflow:hidden}
    .matchmaking-phase::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,var(--accent) 0%,var(--accent2) 100%)}
    .matchmaking-phase-header{font-size:1rem;font-weight:700;color:var(--accent);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;padding-left:10px;display:flex;align-items:center;gap:8px}
    .matchmaking-phase-header::before{content:'⚡';font-size:0.9rem}
    .matchmaking-phase-players{display:flex;flex-wrap:wrap;gap:6px}
    .matchmaking-phase-player{padding:4px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;font-size:0.85rem;color:var(--text2);animation:fadeIn 0.3s ease;transition:var(--transition);box-shadow:0 2px 8px rgba(0,0,0,0.2);position:relative}
    .matchmaking-phase-player:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px rgba(232,184,75,0.3)}
    .matchmaking-phase-player.in-both{border-color:var(--success);background:rgba(76,232,122,0.1);color:var(--success)}
    .matchmaking-phase-player.in-both::after{content:'✓';position:absolute;top:-6px;right:-6px;width:16px;height:16px;background:var(--success);border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;color:var(--bg);font-weight:700}
    .matchmaking-phase-player.skipped{border-color:var(--danger);background:rgba(232,76,76,0.1);color:var(--danger);opacity:0.7}
    .matchmaking-phase-player.skipped::after{content:'⏭';position:absolute;top:-6px;right:-6px;width:16px;height:16px;background:var(--danger);border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;color:var(--bg);font-weight:700}
    
    /* RANK UP EFFECT */
    #rankUpContainer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;display:flex;align-items:center;justify-content:center}
    .rank-up-effect{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Rajdhani',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:16px 24px;border-radius:24px;box-shadow:0 8px 32px rgba(232,184,75,.5);border:2px solid rgba(255,255,255,.1);color:#0a0c12;background:linear-gradient(135deg,var(--accent),var(--accent2));font-size:1.2rem;animation:globalRankUp 2.5s ease forwards}
    
    @media (max-width:1024px) {
      .right-panel{grid-template-rows:1fr;overflow:visible;min-height:auto}
    }
    
    /* BOTTOM RIGHT - INFOGRAPHICS */
    .info-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:0 8px 8px 8px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.3);transition:opacity 0.5s ease}
    .info-indicator{display:flex;gap:8px;padding:8px 0;margin-bottom:8px}
    .info-dot{width:12px;height:12px;border-radius:50%;background:var(--bg3);border:2px solid var(--border);transition:var(--transition)}
    .info-dot.active{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px rgba(232,184,75,0.5)}
    .info-dot.next{border-color:var(--accent);border-style:dashed}
    .info-tabs{display:flex;gap:8px;margin-bottom:16px}
    .info-tab{flex:1;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);font-size:0.9rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;cursor:pointer;transition:var(--transition)}
    .info-tab.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
    .info-content{flex:1;display:flex;flex-direction:column;overflow:hidden;transition:opacity 0.4s ease,transform 0.4s ease}
    .info-view{display:none;flex:1;animation:fadeIn 0.4s ease}
    .info-view.active{display:flex;flex-direction:column}
    
    /* POINTS CHART */
    .chart-container{flex:1;display:flex;align-items:flex-end;gap:12px;padding:20px 10px 30px 10px;overflow-x:auto;position:relative}
    .chart-bar{flex:1;min-width:50px;background:linear-gradient(180deg,var(--accent) 0%,var(--accent2) 50%,rgba(201,122,47,0.6) 100%);border-radius:8px 8px 0 0;transition:all 0.4s cubic-bezier(0.4,0,0.2,1);position:relative;box-shadow:0 4px 16px rgba(232,184,75,0.3);cursor:pointer}
    .chart-bar:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(232,184,75,0.5)}
    .chart-bar::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,rgba(255,255,255,0.8) 0%,rgba(255,255,255,0.2) 100%);border-radius:8px 8px 0 0}
    .chart-bar-label{position:absolute;bottom:-25px;left:50%;transform:translateX(-50%);font-size:0.85rem;color:var(--text2);font-weight:600;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,0.5)}
    .chart-bar-value{position:absolute;top:-28px;left:50%;transform:translateX(-50%);font-size:1rem;color:var(--accent);font-weight:700;text-shadow:0 2px 8px rgba(232,184,75,0.5);background:var(--bg3);padding:4px 10px;border-radius:12px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
    .chart-bar-rank{position:absolute;top:-55px;left:50%;transform:translateX(-50%);font-size:0.75rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:1px}
    
    /* STREAK VIEW */
    .streak-list{flex:1;overflow-y:auto}
    .streak-item{display:flex;align-items:center;padding:12px;margin-bottom:8px;background:var(--bg3);border-radius:var(--radius-sm);transition:var(--transition)}
    .streak-item:hover{background:var(--border)}
    .streak-icon{font-size:1.5rem;margin-right:12px}
    .streak-name{flex:1;font-weight:600}
    .streak-value{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:var(--accent)}
    
    /* MATCHES LIST */
    .matches-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-right:10px}
    .match-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);animation:fadeIn 0.3s ease}
    .match-winner{font-size:1rem;color:var(--success);font-weight:600}
    .match-loser{font-size:1rem;color:var(--danger);font-weight:600}
    .match-date{font-size:0.85rem;color:var(--text3)}
    .match-score{font-size:1.1rem;font-weight:700;color:var(--text)}
    .match-divider{color:var(--text3);margin:0 8px}
    
    /* RANKS DISTRIBUTION */
    .ranks-distribution{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:8px;padding-right:10px}
    .rank-dist-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;text-align:center;animation:fadeIn 0.3s ease}
    .rank-dist-count{font-size:1.5rem;font-weight:700;color:var(--accent)}
    .rank-dist-name{font-size:0.75rem;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}
    
    /* ACTIVITY STATS */
    .activity-stats{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-right:10px}
    .activity-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);animation:fadeIn 0.3s ease}
    .activity-name{font-size:0.95rem;color:var(--text);font-weight:600}
    .activity-count{font-size:1.1rem;color:var(--accent);font-weight:700}
    
    /* POINTS DISTRIBUTION */
    .points-distribution{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding-right:10px}
    .points-dist-bar{height:24px;background:var(--bg2);border-radius:12px;overflow:hidden;position:relative;border:1px solid var(--border)}
    .points-dist-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.5s ease}
    .points-dist-label{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:0.8rem;color:var(--text);font-weight:600}
    .points-dist-count{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:0.8rem;color:var(--text2);font-weight:600}
    .points-dist-range{position:absolute;left:50%;top:-20px;transform:translateX(-50%);font-size:0.7rem;color:var(--accent);font-weight:700}
    
    /* TOP PERFORMERS */
    .top-performers{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-right:10px}
    .top-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);animation:fadeIn 0.3s ease}
    .top-name{font-size:1rem;color:var(--text);font-weight:600}
    .top-value{font-size:1.2rem;color:var(--accent);font-weight:700}
    
    /* MATCHMAKING STATS */
    .matchmaking-stats{flex:1;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:12px;padding-right:10px}
    .mm-stat-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;text-align:center;animation:fadeIn 0.3s ease}
    .mm-stat-value{font-size:2rem;font-weight:700;color:var(--accent)}
    .mm-stat-label{font-size:0.8rem;color:var(--text2);margin-top:6px;text-transform:uppercase;letter-spacing:0.5px}
    
    /* MATCH PHASE VIEW */
    .phase-list{flex:1;overflow-y:auto}
    .phase-item{padding:14px;margin-bottom:8px;background:var(--bg3);border-radius:var(--radius-sm);transition:var(--transition)}
    .phase-item:hover{background:var(--border)}
    .phase-label{font-size:0.9rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
    .phase-value{font-size:1.2rem;font-weight:600;color:var(--accent)}
    
    /* ANIMATIONS */
    @keyframes fadeIn{0%{opacity:0;transform:translateY(10px)}30%{opacity:0.5}100%{opacity:1;transform:translateY(0)}}
    @keyframes scaleIn{0%{opacity:0;transform:scale(0.8)}50%{opacity:0.8}100%{opacity:1;transform:scale(1)}}
    @keyframes infographicFadeOut{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-10px)}}
    @keyframes infographicFadeIn{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes particleRise{0%{opacity:0;transform:translateY(0) translateX(0) rotate(0) scale(0)}15%{opacity:1;transform:translateY(-30px) translateX(calc(var(--dx,0px)*0.1)) rotate(calc(var(--rot,0deg)*0.1)) scale(1)}100%{opacity:0;transform:translateY(var(--dy,-200px)) translateX(var(--dx,0px)) rotate(var(--rot,0deg)) scale(0.2)}}
    @keyframes rankFlash{0%{opacity:0}15%{opacity:1}100%{opacity:0}}
    @keyframes rankVignette{0%{opacity:0}10%{opacity:1}70%{opacity:0.8}100%{opacity:0}}
    @keyframes rankShake{0%,100%{transform:none}15%{transform:translateX(-6px) rotate(-1deg)}30%{transform:translateX(8px) rotate(1.2deg)}45%{transform:translateX(-5px) rotate(-0.8deg)}60%{transform:translateX(4px) rotate(0.5deg)}75%{transform:translateX(-2px)}90%{transform:translateX(1px)}}
    
    /* SMOOTH TRANSITIONS */
    *{transition:all 0.3s cubic-bezier(0.4,0,0.2,1)}
    
    /* RANK UP ANIMATIONS */
    @keyframes globalRankUp{
      0%{opacity:0;transform:translate(-50%,-50%) scale(0.3) rotate(-5deg)}
      20%{opacity:1;transform:translate(-50%,-50%) scale(1.1) rotate(2deg)}
      30%{transform:translate(-50%,-50%) scale(0.95) rotate(-1deg)}
      40%{transform:translate(-50%,-50%) scale(1.02) rotate(0.5deg)}
      50%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0deg)}
      75%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0deg)}
      100%{opacity:0;transform:translate(-50%,-70%) scale(0.8) rotate(3deg)}
    }
    @keyframes globalRankUpGold{
      0%{opacity:0;transform:translate(-50%,-50%) scale(0.2) rotate(-10deg)}
      20%{opacity:1;transform:translate(-50%,-50%) scale(1.2) rotate(5deg)}
      30%{transform:translate(-50%,-50%) scale(0.9) rotate(-2deg)}
      40%{transform:translate(-50%,-50%) scale(1.05) rotate(1deg)}
      60%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0deg)}
      85%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0deg)}
      100%{opacity:0;transform:translate(-50%,-80%) scale(0.7) rotate(5deg)}
    }
    @keyframes globalRankUpRuby{
      0%{opacity:0;transform:translate(-50%,-50%) scale(0.15) rotate(-15deg)}
      25%{opacity:1;transform:translate(-50%,-50%) scale(1.3) rotate(8deg)}
      35%{transform:translate(-50%,-50%) scale(0.85) rotate(-3deg)}
      45%{transform:translate(-50%,-50%) scale(1.08) rotate(2deg)}
      65%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0deg)}
      90%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0deg)}
      100%{opacity:0;transform:translate(-50%,-90%) scale(0.6) rotate(8deg)}
    }
    @keyframes globalRankUpDiamond{
      0%{opacity:0;transform:translate(-50%,-50%) scale(0.1) rotate(-20deg)}
      30%{opacity:1;transform:translate(-50%,-50%) scale(1.4) rotate(12deg)}
      40%{transform:translate(-50%,-50%) scale(0.8) rotate(-5deg)}
      50%{transform:translate(-50%,-50%) scale(1.1) rotate(3deg)}

    function showRankUpEffect(playerName, rankName) {
      const container = document.getElementById('rankUpContainer');
      const effect = getRankUpEffect(rankName);
      const notification = document.createElement('div');
      notification.style.cssText = `
        position:fixed;top:50%;left:50%;
        transform:translate(-50%,-50%);
        background:${effect.bg};
        color:${effect.color};
        font-family:"Barlow Condensed",sans-serif;
        font-size:${effect.fontSize};
        font-weight:700;
        padding:${effect.padding};
        border-radius:${effect.borderRadius};
        z-index:300;
        animation:${effect.animation} ${effect.duration}s cubic-bezier(0.34,1.56,0.64,1) forwards;
        white-space:nowrap;
        box-shadow:${effect.shadow};
        border:${effect.border};
        text-align:center;
        line-height:1.4;
        letter-spacing:1px;
      `;
      notification.innerHTML = `${playerName}<br>${rankName}`;
      container.appendChild(notification);
      
      // === PARTIKEL ===
      if(effect.particles) createParticles(effect.particles, effect.particleCount||20);
      
      // === EXTRA PARTIKEL-WELLE für Ultra-Ränge ===
      if(effect.extraWave){
        setTimeout(()=>createParticles(effect.particles, effect.particleCount||20), 600);
        if(effect.extraWave>=2) setTimeout(()=>createParticles(effect.particles, effect.particleCount||20), 1200);
      }
      
      // === FLASH ===
      if(effect.flash){
        const flash=document.createElement('div');
        flash.style.cssText=`position:fixed;inset:0;background:${effect.flash};animation:rankFlash ${effect.flashDur||0.5}s ease-out forwards;pointer-events:none;z-index:298`;
        document.body.appendChild(flash);
        setTimeout(()=>flash.remove(),(effect.flashDur||0.5)*1000);
      }
      
      // === VIGNETTE ===
      if(effect.vignette){
        const vignette=document.createElement('div');
        vignette.style.cssText=`position:fixed;inset:0;background:${effect.vignette};animation:rankVignette 0.8s ease-out forwards;pointer-events:none;z-index:298`;
        document.body.appendChild(vignette);
        setTimeout(()=>vignette.remove(),800);
      }
      
      // === SHAKE ===
      if(effect.shake){
        document.body.style.animation=`rankShake 0.6s ease`;
        setTimeout(()=>document.body.style.animation='',600);
      }
      
      setTimeout(() => {
        notification.remove();
      }, effect.duration * 1000);
    }
    
    function createParticles(type, count=24){
      const container=document.createElement('div');
      container.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:299;overflow:hidden';
      document.body.appendChild(container);

      const shapes = type==='ultima'||type==='apex'||type==='transzendenz'||type==='unendlichkeit'?['circle','square','diamond','star','cross']:
                     type==='titan'||type==='ewigkeit'||type==='universum'||type==='galaxis'?['circle','square','diamond','star','cross']:
                     type==='kosmos'||type==='olymp'?['circle','star','diamond']:
                     type==='prestige'?['circle','square','diamond','star','cross']:
                     type==='god'?['circle','star','diamond']:
                     type==='champion'||type==='meister'?['circle','diamond']:['circle'];

      for(let i=0;i<count;i++){
        setTimeout(()=>{
          const particle=document.createElement('div');
          const size=Math.random()*(type==='ultima'?32:type==='apex'?30:type==='transzendenz'?29:type==='unendlichkeit'?28:type==='ewigkeit'?27:type==='universum'?26:type==='galaxis'?25:type==='kosmos'?24:type==='olymp'?23:type==='titan'?26:type==='prestige'?20:type==='god'?22:type==='champion'?18:14)+6;
          const startX=Math.random()*100;
          const dur=Math.random()*2.5+1.5;
          const dx=(Math.random()-0.5)*300;
          const dy=-(Math.random()*400+100);
          const rot=Math.random()*720-360;
          const shape=shapes[Math.floor(Math.random()*shapes.length)];
          const bg=getParticleColor(type);
          const borderR=shape==='diamond'?'0':shape==='star'?'2px':shape==='square'?'0':shape==='cross'?'2px':'50%';
          const transform=shape==='diamond'?'rotate(45deg)':shape==='cross'?'rotate(45deg)':'';
          
          particle.style.cssText=`
            position:absolute;
            left:${startX}vw;bottom:0;
            width:${size}px;height:${size}px;
            border-radius:${borderR};
            background:${bg};
            transform:${transform};
            box-shadow:0 0 ${size*0.8}px ${bg.includes('gradient')?'rgba(255,105,180,0.8)':'currentColor'};
            animation:particleRise ${dur}s ease-out forwards;
            --dx:${dx}px;--dy:${dy}px;--rot:${rot}deg;
          `;
          container.appendChild(particle);
          setTimeout(()=>particle.remove(),dur*1000+200);
        }, Math.random()*(type==='ultima'?2200:type==='apex'?2100:type==='transzendenz'?2000:type==='unendlichkeit'?1900:type==='ewigkeit'?1800:type==='universum'?1700:type==='galaxis'?1650:type==='kosmos'?1600:type==='olymp'?1550:type==='titan'?1600:type==='god'?1200:800));
      }
      setTimeout(()=>container.remove(),4000);
    }

      if(type==='universum'){

    function checkRankUps() {
      if(!state.players || !Array.isArray(state.players)) return;
      
      state.players.forEach(player => {
        if(!player.active) return;
        const currentRank = getRank(player.points);
        const previousRank = previousRanks[player.id];
        
        if(previousRank && previousRank.points < currentRank.points) {
          showRankUpEffect(player.name, currentRank.name);
        }
        
        previousRanks[player.id] = currentRank;
      });
    }
    
    function renderMatchmakingPhases() {
      if(!state.players || !Array.isArray(state.players)) return;
      const sortedPlayers = [...state.players].filter(p => p.active !== false).sort((a, b) => b.points - a.points);
      const matchmakingPhases = document.getElementById('matchmakingPhases');
      
      const currentPhase = state.mmPhase || 'low';
      const nextPhase = currentPhase === 'low' ? 'high' : 'low';
      
      const currentPhasePlayers = sortedPlayers.filter(p => {
        const rank = getRank(p.points);
        if (currentPhase === 'low') {
          return rank.points < PROT_PLAT;
        } else {
          return rank.points >= PROT_PLAT;
        }
      });
      
      const nextPhasePlayers = sortedPlayers.filter(p => {
        const rank = getRank(p.points);
        if (nextPhase === 'low') {
          return rank.points < PROT_PLAT;
        } else {
          return rank.points >= PROT_PLAT;
        }
      });
      
      // Spieler identifizieren, die in beiden Phasen vorkommen
      const currentPhasePlayerIds = new Set(currentPhasePlayers.map(p => p.id));
      const nextPhasePlayerIds = new Set(nextPhasePlayers.map(p => p.id));
      const inBoth = sortedPlayers.filter(p => currentPhasePlayerIds.has(p.id) && nextPhasePlayerIds.has(p.id));
      const inBothIds = new Set(inBoth.map(p => p.id));
      
      // Übersprungene Spieler identifizieren (in aktueller Phase aber nicht in nächster)
      const skippedPlayers = currentPhasePlayers.filter(p => !nextPhasePlayerIds.has(p.id));
      const skippedIds = new Set(skippedPlayers.map(p => p.id));
      
      matchmakingPhases.innerHTML = `
        <div class="matchmaking-phase">
          <div class="matchmaking-phase-header">Aktuell: ${currentPhase === 'low' ? 'Niedrige Liga' : 'Hohe Liga'}</div>
          <div class="matchmaking-phase-players">
            ${currentPhasePlayers.map(p => {
              let classes = 'matchmaking-phase-player';
              if (inBothIds.has(p.id)) classes += ' in-both';
              return `<div class="${classes}">${p.name}</div>`;
            }).join('')}
          </div>
        </div>
        <div class="matchmaking-phase">
          <div class="matchmaking-phase-header">Nächste: ${nextPhase === 'low' ? 'Niedrige Liga' : 'Hohe Liga'}</div>
          <div class="matchmaking-phase-players">
            ${nextPhasePlayers.map(p => {
              let classes = 'matchmaking-phase-player';
              if (inBothIds.has(p.id)) classes += ' in-both';
              return `<div class="${classes}">${p.name}</div>`;
            }).join('')}
          </div>
        </div>
      `;
    }

    function render() {
      if(!state) return;
      if(!state.players || !Array.isArray(state.players)) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'flex';
        document.getElementById('errorText').textContent = 'Keine Spieler-Daten gefunden';
        return;
      }
      
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'grid';
      
      // Start infographic rotation
      if(!infographicInterval) {
        infographicInterval = setInterval(() => {
          currentInfographicIndex++;
          renderInfographics();
        }, 8000);
      }
      
      // Header elements removed
      
      // Matchmaking Phases
      renderMatchmakingPhases();
      
      // Ranklist
      const allPlayersSorted = [...state.players].sort((a, b) => b.points - a.points);
      const activePlayers = allPlayersSorted.filter(p => p.active !== false);
      const inactivePlayers = allPlayersSorted.filter(p => p.active === false);
      const ranklist = document.getElementById('ranklist');
      ranklist.innerHTML = '';
      
      activePlayers.forEach((player, index) => {
        const absoluteRank = allPlayersSorted.findIndex(p => p.id === player.id) + 1;
        const rank = getRank(player.points);
        const maxAccounts = getMaxAccountsForSpieler(player.key);
        const accounts = state.players.filter(p => p.key === player.key).length;
        
        const item = document.createElement('div');
        item.className = 'rank-item';
        const rankIconClass = 'rank-' + rank.icon.toLowerCase();
        item.innerHTML = `
          <div class="rank-number">${absoluteRank}.</div>
          <div class="rl-icon-outer" style="border-color:${rank.color}">
            <div class="rank-icon ${rankIconClass}"></div>
          </div>
          <div class="rank-info">
            <div class="rank-name">
              ${player.name}
              <span class="rank-badge" style="background:${rank.color};color:${rank.color === '#0a0a0a' || rank.color.includes('gradient') ? '#fff' : '#000'}">${rank.name}</span>
            </div>
            <div>
              <span class="rank-points">${player.points}</span>
              <span class="rank-max">(${player.maxPoints})</span>
              <span class="rank-streak">🔥 ${player.streak || 0}</span>
              <span class="rank-accounts">${accounts}/${maxAccounts}</span>
            </div>
          </div>
        `;
        ranklist.appendChild(item);
        
        // Inaktive Spieler zwischen aktiven Spielern anzeigen
        const nextActivePlayer = activePlayers[index + 1];
        if (nextActivePlayer) {
          const currentRank = allPlayersSorted.findIndex(p => p.id === player.id);
          const nextRank = allPlayersSorted.findIndex(p => p.id === nextActivePlayer.id);
          const playersBetween = allPlayersSorted.slice(currentRank + 1, nextRank).filter(p => p.active === false);
          
          if (playersBetween.length > 0) {
            const betweenItem = document.createElement('div');
            betweenItem.className = 'rank-between';
            const playerNames = playersBetween.map(p => p.name).join(', ');
            betweenItem.innerHTML = `
              <div class="rank-between-count">${playersBetween.length} Spieler dazwischen</div>
              <div class="rank-between-names">(${playerNames})</div>
            `;
            ranklist.appendChild(betweenItem);
          }
        }
      });
      
      // Auto-scroll für Rangliste wenn zu viele Spieler
      if (activePlayers.length > 5) {
        let scrollIndex = 0;
        const scrollInterval = setInterval(() => {
          if (!document.getElementById('ranklist')) {
            clearInterval(scrollInterval);
            return;
          }
          const items = ranklist.querySelectorAll('.rank-item');
          if (items.length === 0) {
            clearInterval(scrollInterval);
            return;
          }
          if (scrollIndex >= items.length) {
            scrollIndex = 0;
            ranklist.scrollTop = 0;
          } else {
            const currentItem = items[scrollIndex];
            if (currentItem) {
              currentItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            scrollIndex++;
          }
        }, 3000);
      }
      
      // Infographics
      renderInfographics();
      
      // Check for rank-ups
      checkRankUps();
    }

      }
      
      infographicContainer.style.opacity = '0';
      infographicContainer.style.transform = 'translateY(-10px)';
      
      setTimeout(() => {
        infographicContainer.innerHTML = html;
        infographicContainer.style.opacity = '1';
        infographicContainer.style.transform = 'translateY(0)';
      }, 300);
      
      if (currentTab === 'points') {
        const pointsChart = document.getElementById('pointsChart');
        const allPlayersSorted = [...state.players].sort((a, b) => b.points - a.points);
        sortedPlayers.slice(0, 5).forEach((player, index) => {
          const bar = document.createElement('div');
          bar.className = 'chart-bar';
          const maxPoints = Math.max(...sortedPlayers.map(p => p.points));
          const percentage = (player.points / maxPoints) * 100;
          const absoluteRank = allPlayersSorted.findIndex(p => p.id === player.id) + 1;
          bar.style.cssText = `height:${percentage}%`;
          bar.innerHTML = `
            <span class="chart-bar-rank">#${absoluteRank}</span>
            <span class="chart-bar-value">${player.points}</span>
            <span class="chart-bar-label">${player.name.substring(0, 8)}</span>
          `;
          pointsChart.appendChild(bar);
        });
      } else if (currentTab === 'streaks') {
        const streaksList = document.getElementById('streaksList');
        const playersWithStreaks = sortedPlayers.filter(p => p.streak > 0).sort((a, b) => b.streak - a.streak);
        playersWithStreaks.slice(0, 5).forEach(player => {
          const item = document.createElement('div');
          item.className = 'streak-item';
          item.innerHTML = `
            <span class="streak-name">${player.name}</span>
            <span class="streak-value">🔥 ${player.streak}</span>
          `;
          streaksList.appendChild(item);
        });
        if (playersWithStreaks.length === 0) {
          streaksList.innerHTML = '<div class="no-data">Keine Streaks</div>';
        }
      } else if (currentTab === 'matches') {
        const matchesList = document.getElementById('matchesList');
        const matches = state.recentMatches || [];
        
        if (matches.length === 0) {
          matchesList.innerHTML = '<div class="no-data">Keine Spiele</div>';
        } else {
          matches.slice(0, 5).forEach(match => {
            const item = document.createElement('div');
            item.className = 'match-item';
            item.innerHTML = `
              <div>
                <span class="match-winner">${match.winner}</span>
                <span class="match-divider">vs</span>
                <span class="match-loser">${match.loser}</span>
              </div>
              <div class="match-score">${match.winnerScore} - ${match.loserScore}</div>
            `;
            matchesList.appendChild(item);
          });
        }
      } else if (currentTab === 'inactive') {
        const inactiveList = document.getElementById('inactiveList');
        const inactivePlayers = sortedPlayers.filter(p => p.active === false);
        
        inactiveList.innerHTML = '';
        inactivePlayers.forEach(player => {
          const item = document.createElement('div');
          item.className = 'inactive-item';
          item.innerHTML = `
            <span class="inactive-name">${player.name}</span>
            <span class="inactive-points">${player.points} Pkt</span>
          `;
          inactiveList.appendChild(item);
        });
        if (inactivePlayers.length === 0) {
          inactiveList.innerHTML = '<div class="no-data">Keine inaktiven Spieler</div>';
        }
        
        // Auto-scroll für inaktive Spieler
        if (!window.inactiveScrollInterval) {
          window.inactiveScrollIndex = 0;
          window.inactiveScrollInterval = setInterval(() => {
            const inactiveList = document.getElementById('inactiveList');
            if (!inactiveList) {
              clearInterval(window.inactiveScrollInterval);
              window.inactiveScrollInterval = null;
              return;
            }
            const items = inactiveList.querySelectorAll('.inactive-item');
            if (items.length === 0) {
              window.inactiveScrollIndex = 0;
              return;
            }
            if (window.inactiveScrollIndex >= items.length) {
              window.inactiveScrollIndex = 0;
              inactiveList.scrollTop = 0;
            } else {
              const currentItem = items[window.inactiveScrollIndex];
              if (currentItem) {
                currentItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
              }
              window.inactiveScrollIndex++;
            }
          }, 2000);
        }
      } else if (currentTab === 'ranks') {
        const ranksDistribution = document.getElementById('ranksDistribution');
        const rankCounts = {};
        sortedPlayers.forEach(player => {
          const rank = getRank(player.points);
          rankCounts[rank.name] = (rankCounts[rank.name] || 0) + 1;
        });
        
        ranksDistribution.innerHTML = '';
        Object.entries(rankCounts).forEach(([rankName, count]) => {
          const item = document.createElement('div');
          item.className = 'rank-dist-item';
          item.innerHTML = `
            <div class="rank-dist-count">${count}</div>
            <div class="rank-dist-name">${rankName}</div>
          `;
          ranksDistribution.appendChild(item);
        });
      } else if (currentTab === 'activity') {
        const activityStats = document.getElementById('activityStats');
        const playerActivity = {};
        sortedPlayers.forEach(player => {
          const gamesPlayed = player.gamesPlayed || 0;
          playerActivity[player.name] = gamesPlayed;
        });
        
        const sortedActivity = Object.entries(playerActivity).sort((a, b) => b[1] - a[1]).slice(0, 8);
        
        activityStats.innerHTML = '';
        sortedActivity.forEach(([name, count]) => {
          const item = document.createElement('div');
          item.className = 'activity-item';
          item.innerHTML = `
            <span class="activity-name">${name}</span>
            <span class="activity-count">${count} Spiele</span>
          `;
          activityStats.appendChild(item);
        });
      } else if (currentTab === 'distribution') {
        const pointsDistribution = document.getElementById('pointsDistribution');
        const pointRanges = [
          { label: '0-5 Pkt', min: 0, max: 5 },
          { label: '6-10 Pkt', min: 6, max: 10 },
          { label: '11-15 Pkt', min: 11, max: 15 },
          { label: '16-20 Pkt', min: 16, max: 20 },
          { label: '21-30 Pkt', min: 21, max: 30 },
          { label: '31-50 Pkt', min: 31, max: 50 },
          { label: '50+ Pkt', min: 51, max: Infinity }
        ];
        
        const distribution = pointRanges.map(range => ({
          ...range,
          count: sortedPlayers.filter(p => p.points >= range.min && p.points <= range.max).length
        }));
        
        const maxCount = Math.max(...distribution.map(d => d.count));
        
        pointsDistribution.innerHTML = '';
        distribution.forEach(range => {
          const percentage = maxCount > 0 ? (range.count / maxCount) * 100 : 0;
          const bar = document.createElement('div');
          bar.className = 'points-dist-bar';
          bar.innerHTML = `
            <div class="points-dist-fill" style="width:${percentage}%"></div>
            <span class="points-dist-label">${range.label}</span>
            <span class="points-dist-count">${range.count}</span>
            <span class="points-dist-range">${range.min}-${range.max === Infinity ? '∞' : range.max} Pkt</span>
          `;
          pointsDistribution.appendChild(bar);
        });
      } else if (currentTab === 'top') {
        const topPerformers = document.getElementById('topPerformers');
        const topGainers = sortedPlayers.slice(0, 5);
        
        topPerformers.innerHTML = '';
        topGainers.forEach((player, index) => {
          const item = document.createElement('div');
          item.className = 'top-item';
          item.innerHTML = `
            <span class="top-name">#${index + 1} ${player.name}</span>
            <span class="top-value">${player.points} Pkt</span>
          `;
          topPerformers.appendChild(item);
        });
      } else if (currentTab === 'matchmaking') {
        const matchmakingStats = document.getElementById('matchmakingStats');
        const activePlayers = sortedPlayers.filter(p => p.active !== false);
        const lowPhasePlayers = activePlayers.filter(p => p.points < PROT_PLAT);
        const highPhasePlayers = activePlayers.filter(p => p.points >= PROT_PLAT);
        
        matchmakingStats.innerHTML = `
          <div class="mm-stat-box">
            <div class="mm-stat-value">${activePlayers.length}</div>
            <div class="mm-stat-label">Aktive Spieler</div>
          </div>
          <div class="mm-stat-box">
            <div class="mm-stat-value">${lowPhasePlayers.length}</div>
            <div class="mm-stat-label">Niedrige Liga</div>
          </div>
          <div class="mm-stat-box">
            <div class="mm-stat-value">${highPhasePlayers.length}</div>
            <div class="mm-stat-label">Hohe Liga</div>
          </div>
          <div class="mm-stat-box">
            <div class="mm-stat-value">${state.round || 0}</div>
            <div class="mm-stat-label">Aktuelle Runde</div>
          </div>
        `;
      }
    }



    function loadState() {
      db.collection('rangspiel_data').doc('main_data')
        .onSnapshot((doc) => {
          if(doc.exists) {
            const data = doc.data();
            state = data.state || data; // Firebase data is nested in 'state' property
            console.log('State loaded from Firebase:', state);
            console.log('Players:', state.players);
            console.log('Players type:', typeof state.players);
            console.log('Players is array:', Array.isArray(state.players));
            render();
          } else {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'flex';
            document.getElementById('errorText').textContent = 'Keine Daten gefunden - Dokument existiert nicht';
          }
        }, (error) => {
          console.error('Firebase error:', error);
          document.getElementById('loading').style.display = 'none';
          document.getElementById('error').style.display = 'flex';
          document.getElementById('errorText').textContent = 'Fehler: ' + error.message;
        });
      
      db.collection('global_badges').doc('badges')
        .onSnapshot((doc) => {
          if(doc.exists) {
            globalBadges = doc.data().data || {};
          }
        });
    }

    auth.signInAnonymously().catch((error) => {
      console.error('Auth error:', error);
    });

    loadState();
  </script>
</body>
</html>
